services:
  # ── Frontend (React SPA) ──
  saint-mary-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saint-mary-church
    ports:
      - "3000:80"
    environment:
      - VITE_SUPABASE_URL=http://host.docker.internal:8000
      - VITE_SUPABASE_ANON_KEY=your-anon-key
      - VITE_API_URL=http://host.docker.internal:3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
